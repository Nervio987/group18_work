version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: pg-vector
    environment:
      - POSTGRES_PASSWORD=MyPassword123!
      - POSTGRES_DB=rag_db
      - POSTGRES_USER=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rag_db"]
      interval: 10s
      timeout: 5s
      retries: 3

  opensearch:
    image: opensearchproject/opensearch:2.15.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  searxng:
    image: searxng/searxng:latest
    container_name: searxng
    ports:
      - "18080:8080"
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/etc/searxng
      - searxng-log:/var/log/searxng
    networks:
      - rag-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  rag-app:
    build: .
    container_name: rag-app
    ports:
      - "8888:8888"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=rag_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=MyPassword123!
      - OPENSEARCH_HOST=http://opensearch:9200
      - OPENSEARCH_USER=admin
      - OPENSEARCH_PASSWORD=
      - OLLAMA_HOST=http://host.docker.internal:11434
      - DEEPSEEK_API_KEY=your-deepseek-api-key
      - DEEPSEEK_BASE_URL=https://api.deepseek.com
      - SEARXNG_HOST=http://searxng:8080
      - SEARXNG_SECRET=your-random-secret-key-change-this
      - MINERU_HOST=http://host.docker.internal:8000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ./knowledge_base:/app/knowledge_base
      - ./uploads:/app/uploads
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      searxng:
        condition: service_healthy
    networks:
      - rag-network
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8888"]

volumes:
  postgres-data:
  opensearch-data:
  redis-data:
  searxng-data:
  searxng-log:

networks:
  rag-network:
    driver: bridge
